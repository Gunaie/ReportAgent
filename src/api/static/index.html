<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能研究助手</title>
<style>
    :root {
        --bg: #f0f2f5; --card: #fff; --fg: #1a1a2e;
        --accent: #2563eb; --border: #e2e8f0;
        --danger: #dc2626; --success: #16a34a; --warn: #d97706;
        --bubble-user: #2563eb; --bubble-ai: #fff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font: 14px/1.6 "Microsoft YaHei","Segoe UI",sans-serif; background: var(--bg); color: var(--fg); height: 100vh; overflow: hidden; }

    /* === 布局 === */
    .app { display: flex; flex-direction: column; height: 100vh; max-width: 800px; margin: 0 auto; }
    .header { text-align: center; padding: 16px; flex-shrink: 0; }
    .header h1 { font-size: 1.3em; }
    .header p { color: #64748b; font-size: 13px; }

    /* === 对话区 === */
    .chat { flex: 1; overflow-y: auto; padding: 0 16px 8px; }
    .msg { display: flex; margin-bottom: 16px; gap: 8px; animation: fadeIn .3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }
    .msg.user { flex-direction: row-reverse; }
    .msg .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .msg.user .avatar { background: #dbeafe; }
    .msg.assistant .avatar { background: #f1f5f9; }
    .msg .bubble { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .msg.user .bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .bubble { background: var(--bubble-ai); border: 1px solid var(--border); border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,.04); }

    /* 报告嵌入 */
    .msg.assistant .bubble.report { max-width: 95%; padding: 16px; }
    .report h1 { font-size: 1.2em; border-bottom: 2px solid var(--accent); padding-bottom: 6px; margin-bottom: 12px; }
    .report h2 { font-size: 1.05em; color: var(--accent); margin: 16px 0 8px; }
    .report h3 { font-size: 1em; margin: 12px 0 6px; }
    .report p { margin: 6px 0; }
    .report ul,.report ol { margin: 6px 0 6px 20px; }
    .report li { margin: 3px 0; }
    .report table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
    .report th,.report td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
    .report th { background: #f8fafc; }
    .report hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
    .report blockquote { border-left: 3px solid var(--accent); padding: 6px 12px; margin: 10px 0; color: #64748b; background: #f8fafc; }
    .report a { color: var(--accent); }
    .report strong { font-weight: 700; }

    /* 进度卡 */
    .progress-msg { background: #f8fafc; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; }
    .progress-msg .bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .progress-msg .fill { height: 100%; background: var(--accent); transition: width .3s; }
    .tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 600; margin-left: 6px; }
    .tag-running { background: #fef3c7; color: var(--warn); }
    .tag-done { background: #dcfce7; color: var(--success); }
    .tag-failed { background: #fee2e2; color: var(--danger); }

    /* === 输入区 === */
    .input-area { flex-shrink: 0; padding: 12px 16px 16px; background: var(--card); border-top: 1px solid var(--border); }
    .input-row { display: flex; gap: 8px; }
    .input-row textarea { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font: inherit; resize: none; min-height: 44px; max-height: 100px; }
    .input-row button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; background: var(--accent); color: #fff; white-space: nowrap; }
    .input-row button:hover { opacity: .9; }
    .input-row button:disabled { opacity: .5; pointer-events: none; }
    .input-hint { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .error-inline { color: var(--danger); font-size: 12px; margin-top: 4px; }

    /* 模板选择器 */
    .templates { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .tpl-chip { padding: 4px 12px; border: 1px solid var(--border); border-radius: 16px; font-size: 12px; cursor: pointer; background: #fff; transition: all .2s; }
    .tpl-chip:hover { border-color: var(--accent); color: var(--accent); }
    .tpl-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    @media (max-width: 600px) {
        .input-row { flex-direction: column; }
        .input-row button { align-self: flex-end; }
    }
</style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>📊 智能研究助手</h1>
        <p>对话式 AI 研究 — 多轮澄清 + 深度分析</p>
    </div>

    <!-- 对话区 -->
    <div id="chatBox" class="chat">
        <div class="msg assistant">
            <div class="avatar">🤖</div>
            <div class="bubble">你好！输入你想研究的主题，我会先确认需求再进行深度分析。<br>例如：<b>分析新能源汽车动力电池的技术趋势和竞争格局</b></div>
        </div>
    </div>

    <!-- 输入区 -->
    <div class="input-area" id="inputArea">
        <div class="templates" id="tplBar">
            <span class="tpl-chip" data-tpl="新能源">⚡ 新能源</span>
            <span class="tpl-chip" data-tpl="半导体">💻 半导体</span>
            <span class="tpl-chip" data-tpl="医药">💊 医药</span>
            <span class="tpl-chip" data-tpl="AI">🤖 AI</span>
        </div>
        <div class="input-row">
            <textarea id="msgInput" placeholder="输入研究主题…" rows="1"></textarea>
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
        <div class="input-hint">Ctrl+Enter 发送 · 输入具体主题获得更好结果</div>
        <div id="inputError" class="error-inline" style="display:none"></div>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
