<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能研究助手</title>
<style>
    :root {
        --bg: #f5f7fa; --card: #fff; --fg: #2c3e50;
        --accent: #2980b9; --border: #e0e0e0;
        --danger: #e74c3c; --success: #27ae60; --warn: #f39c12;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font: 15px/1.6 "Microsoft YaHei","Segoe UI",sans-serif; background: var(--bg); color: var(--fg); }
    .container { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

    /* 卡片 */
    .card { background: var(--card); border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card h2 { font-size: 1.1em; margin-bottom: 12px; }

    /* 输入 */
    textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font: inherit; resize: vertical; min-height: 60px; }
    button { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; background: var(--accent); color: #fff; }
    button:hover { opacity: .9; }

    /* 进度 */
    .progress-wrap { display: none; margin-top: 12px; }
    .progress-head { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
    .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width .3s; width: 0; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .tag-running { background: #fef5e7; color: var(--warn); }
    .tag-done { background: #e8f8ef; color: var(--success); }
    .tag-failed { background: #fdecea; color: var(--danger); }

    /* 结果 & 错误 */
    .error-box { margin-top: 12px; padding: 12px; background: #fdecea; color: var(--danger); border-radius: 6px; font-size: 14px; display: none; }

    /* 报告渲染 */
    .report { margin-top: 12px; }
    .report h1 { font-size: 1.4em; margin: 24px 0 12px; border-bottom: 2px solid var(--accent); padding-bottom: 6px; }
    .report h2 { font-size: 1.2em; margin: 20px 0 10px; color: var(--accent); }
    .report h3 { font-size: 1.05em; margin: 16px 0 8px; }
    .report h4 { font-size: 1em; margin: 12px 0 6px; }
    .report p { margin: 8px 0; }
    .report ul, .report ol { margin: 8px 0 8px 24px; }
    .report li { margin: 4px 0; }
    .report a { color: var(--accent); }
    .report table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
    .report th, .report td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
    .report th { background: #f0f4f8; font-weight: 600; }
    .report hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .report blockquote { border-left: 4px solid var(--accent); padding: 8px 16px; margin: 12px 0; color: #7f8c8d; background: #f9fafb; }
    .report strong { font-weight: 700; }

    /* 表格 */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: #7f8c8d; font-weight: 600; }
    .hint { font-size: 13px; color: #7f8c8d; margin-top: 6px; }
    .empty { color: #aaa; text-align: center; padding: 16px; }
</style>
</head>
<body>
<div class="container">
    <h1>📊 智能研究助手</h1>
    <p style="color:#7f8c8d;margin-bottom:24px">输入研究主题 → AI 搜索 + 多角度分析 → 生成研究报告</p>

    <!-- 输入 -->
    <div class="card">
        <h2>🔍 研究主题</h2>
        <textarea id="topicInput" placeholder="例如：新能源汽车行业竞争格局分析&#10;例如：人工智能产业链投资机会&#10;例如：美联储降息对A股的影响"></textarea>
        <div style="display:flex;gap:12px;align-items:center;margin-top:8px">
            <button onclick="startResearch()">开始研究</button>
            <span class="hint">Ctrl+Enter 快捷提交</span>
        </div>

        <div id="progressWrap" class="progress-wrap">
            <div class="progress-head">
                <span id="stepText">准备中…</span>
                <span id="statusTag" class="tag tag-running">分析中</span>
            </div>
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        </div>

        <div id="reportArea" class="report" style="display:none"></div>
        <div id="errorBox" class="error-box"></div>
    </div>

    <!-- 历史 -->
    <div class="card">
        <h2>📋 历史报告</h2>
        <table>
            <thead><tr><th>研究主题</th><th>摘要</th><th>时间</th></tr></thead>
            <tbody id="reportsBody"><tr><td class="empty" colspan="3">加载中…</td></tr></tbody>
        </table>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
